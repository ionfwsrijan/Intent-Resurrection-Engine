<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intent Resurrection Collector</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 320px;
        font-family: "Segoe UI", sans-serif;
        background: #f7f1e9;
        color: #201a15;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.2rem;
      }
      p {
        line-height: 1.5;
      }
      button {
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #154ef5, #0c318f);
        color: white;
        cursor: pointer;
      }
      .secondary {
        background: rgba(32, 26, 21, 0.08);
        color: #201a15;
      }
      .status {
        margin-top: 12px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(21, 78, 245, 0.08);
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <h1>Intent Resurrection Collector</h1>
    <p>Capture live tabs from this window and send them into the n8n intake workflow.</p>
    <button id="captureButton" type="button">Send capture now</button>
    <button id="previewButton" class="secondary" type="button">Preview capture</button>
    <button id="optionsButton" class="secondary" type="button">Open options</button>
    <div id="status" class="status">Loading collector status...</div>
    <script src="./popup.js"></script>
  </body>
</html>
